<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemas Defensoriais - APIDEP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Reset básico */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bbf7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px 25px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 110%; /* Aumenta um pouco para compensar o vazio */
      max-width: 350px;
      height: auto;
      /* O PULO DO GATO: Margens negativas anulam o espaço vazio da imagem */
      margin: -20px auto -45px auto; 
      display: block;
      object-fit: contain;
    }

    h1 {
      color: #065f46;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 22px;
      position: relative;
      z-index: 2; /* Garante que o texto fique acima de qualquer transparência */
    }

    /* Estilo dos Botões */
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 16px;
    }

    /* Botão Branco */
    .btn-white {
      background: #ffffff;
      color: #374151;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* Botão Verde */
    .btn-green {
      background: linear-gradient(90deg, #065f46, #10b981);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .arrow {
      font-size: 18px;
      opacity: 0.7;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
      padding: 0 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <img src="logo-apidep.png" class="logo" alt="Logo APIDEP">

    <h1>Sistemas Defensoriais</h1>

    <a href="https://calculadora-alimentar-dpe.vercel.app/" class="btn btn-white">
      <span>⚖️ Calculadora de Pensão Alimentícia</span>
      <span class="arrow">›</span>
    </a>

    <a href="https://gerador-oficios-dp.vercel.app/" class="btn btn-green">
      <span>📄 Jornadas Itinerantes e Ofícios</span>
      <span class="arrow">›</span>
    </a>

    <div class="footer">
      Associação Piauiense das Defensoras e Defensores Públicos
    </div>

  </div>

</body>
</html>

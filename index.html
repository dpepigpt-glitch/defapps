<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistemas Defensoriais</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bbf7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* PADRÃO INSTITUCIONAL (efeito leve no fundo) */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 20%, rgba(16,185,129,0.15), transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(5,150,105,0.15), transparent 40%);
      animation: movimento 12s linear infinite;
      z-index: 0;
    }

    @keyframes movimento {
      0% { transform: translate(0,0); }
      50% { transform: translate(-50px,-50px); }
      100% { transform: translate(0,0); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: white;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      text-align: center;
      width: 400px;

      /* ANIMAÇÃO AO ENTRAR */
      opacity: 0;
      transform: translateY(30px);
      animation: entrar 0.8s ease forwards;
    }

    @keyframes entrar {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      color: #065f46;
      margin-bottom: 40px;
      font-weight: 600;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      padding: 15px;
      background: #10b981;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #059669;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #6b7280;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- logo-apidep.png -->
    <img src="logo-apidep.png" class="logo" alt="Logo">

    <h1>Sistemas Defensoriais</h1>

    <a class="btn" href="https://calculadora-alimentar-dpe.vercel.app/">
      📊 Calculadora de Pensão Alimentícia
    </a>

    <a class="btn" href="https://gerador-oficios-dp.vercel.app/">
      📄 Jornadas Itinerantes e Ofícios
    </a>

    <div class="footer">
      Defensoria Pública
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemas Defensoriais</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bbf7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .container {
      background: #ffffff;
      padding: 40px 25px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 520px;
    }

    .logo {
      width: 100%;
      max-width: 320px;
      height: auto;
      /* Margem negativa de -75px para o nome subir bem para dentro da logo */
      margin: -10px auto -75px auto; 
      display: block;
      object-fit: contain;
    }

    h1 {
      color: #064e3b;
      margin-bottom: 30px;
      font-weight: 800; /* Fonte mais pesada e marcante */
      font-size: 26px;
      letter-spacing: -1px;
      position: relative;
      z-index: 10;
    }

    .btn-wrapper {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 15px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
      text-align: center;
      min-height: 110px;
    }

    /* NOVO FUNDO: Verde claro para a calculadora */
    .btn-calc {
      background-color: #d1fae5; 
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    /* Verde escuro para jornadas */
    .btn-jornada {
      background: linear-gradient(135deg, #065f46, #10b981);
      color: white;
      box-shadow: 0 5px 15px rgba(6, 95, 70, 0.2);
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .footer {
      margin-top: 35px;
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
      max-width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    /* Responsividade para celular */
    @media (max-width: 480px) {
      .btn-wrapper { flex-direction: column; }
      .btn { min-height: auto; flex-direction: row; padding: 18px; font-size: 15px; }
      .logo { margin-bottom: -50px; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <img src="logo-apidep.jpg" class="logo" alt="Logo Def">

    <h1>Sistemas Defensoriais</h1>

    <div class="btn-wrapper">
      <a href="https://calculadora-alimentar-dpe.vercel.app/" class="btn btn-calc">
        <span style="font-size: 26px;">⚖️</span>
        <span>Calculadora de Pensão</span>
      </a>

      <a href="https://gerador-oficios-dp.vercel.app/" class="btn btn-jornada">
        <span style="font-size: 26px;">📄</span>
        <span>Gerador de Ofícios</span>
      </a>

       <a href="https://def-ap.vercel.app/" class="btn btn-SGPD">
        <span style="font-size: 26px;">📗</span>
        <span> Controle Processual </span>
    </div>

    <div class="footer">
      Amigos da Defensoria - Somente para Defensores Legais 
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistemas Defensoriais</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #d1fae5, #86efac);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      padding: 50px;
      border-radius: 24px;
      width: 90%;
      max-width: 650px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.15);
      animation: fade 0.8s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 🔥 LOGO CORRIGIDA DE VERDADE */
    .logo {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
      margin: 0 auto 25px auto;
      object-fit: contain;
    }

    h1 {
      color: #065f46;
      margin-bottom: 30px;
      font-size: 26px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      margin: 14px 0;
      border-radius: 16px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      transition: 0.3s;
    }

    .card.light {
      background: #ecfdf5;
      color: #065f46;
    }

    .card.dark {
      background: linear-gradient(90deg, #065f46, #10b981);
      color: white;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #6b7280;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo-apidep.png" class="logo">

    <h1>Sistemas Defensoriais</h1>

    <a class="card light" href="https://calculadora-alimentar-dpe.vercel.app/">
      ⚖️ Calculadora de Pensão Alimentícia →
    </a>

    <a class="card dark" href="https://gerador-oficios-dp.vercel.app/">
      📄 Jornadas Itinerantes e Ofícios →
    </a>

    <div class="footer">
      Associação Piauiense das Defensoras e Defensores Públicos
    </div>

  </div>

</body>
</html>

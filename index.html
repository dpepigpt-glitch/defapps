<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemas Defensoriais - APIDEP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bbf7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .container {
      background: white;
      padding: 30px 20px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 550px; /* Aumentei um pouco para caber os botões lado a lado */
    }

    .logo {
      width: 100%;
      max-width: 320px;
      height: auto;
      /* Centraliza e puxa o conteúdo de baixo para compensar o vazio do PNG */
      margin: -20px auto -50px auto; 
      display: block;
    }

    h1 {
      color: #065f46;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 22px;
    }

    /* CONTAINER DOS BOTÕES LADO A LADO */
    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap; /* Garante que em celulares muito pequenos eles empilhem */
    }

    .btn {
      flex: 1; /* Faz os dois botões terem o mesmo tamanho */
      min-width: 200px; /* Largura mínima para não ficarem esmagados */
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 15px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
      line-height: 1.2;
    }

    /* Botão Calculadora - Verde Clarinho */
    .btn-light-green {
      background: #f0fdf4; /* Verde bem suave */
      color: #065f46;
      border: 1px solid #bbf7d0;
    }

    /* Botão Jornadas - Verde Escuro Degradê */
    .btn-dark-green {
      background: linear-gradient(90deg, #065f46, #10b981);
      color: white;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .footer {
      margin-top: 30px;
      font-size: 11px;
      color: #6b7280;
      max-width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <img src="logo-apidep.png" class="logo" alt="Logo APIDEP">

    <h1>Sistemas Defensoriais</h1>

    <div class="button-group">
      <a href="https://calculadora-alimentar-dpe.vercel.app/" class="btn btn-light-green">
        ⚖️ Calculadora de Pensão
      </a>

      <a href="https://gerador-oficios-dp.vercel.app/" class="btn btn-dark-green">
        📄 Jornadas e Ofícios
      </a>
    </div>

    <div class="footer">
      Associação Piauiense das Defensoras e Defensores Públicos
    </div>

  </div>

</body>
</html>

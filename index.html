<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistemas Defensoriais - APIDEP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: 'Inter', sans-serif; 
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #d1fae5, #bbf7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .container {
      background: rgba(255, 255, 255, 0.98);
      padding: 35px 25px;
      border-radius: 28px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 500px; /* Largura ajustada para os botões lado a lado */
    }

    .logo {
      width: 100%;
      max-width: 300px;
      height: auto;
      /* AJUSTE AQUI: O valor -65px faz o nome subir bastante */
      margin: -10px auto -65px auto; 
      display: block;
      object-fit: contain;
    }

    h1 {
      color: #064e3b; /* Verde mais fechado e elegante */
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.03em; /* Deixa a fonte mais moderna */
      position: relative;
      z-index: 5;
    }

    /* CONTAINER PARA OS BOTÕES LADO A LADO */
    .btn-wrapper {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      flex: 1; /* Faz ambos terem o mesmo tamanho */
      display: flex;
      flex-direction: column; /* Ícone em cima do texto para caber melhor lado a lado */
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 10px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      min-height: 100px;
    }

    /* Botão Calculadora - Verde Menta Clarinho */
    .btn-calc {
      background: #f0fdf4;
      color: #065f46;
      border: 1px solid #d1fae5;
    }

    /* Botão Jornadas - Verde Gradê */
    .btn-jornada {
      background: linear-gradient(145deg, #065f46, #10b981);
      color: white;
      box-shadow: 0 4px 15px rgba(6, 95, 70, 0.2);
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .btn span {
      display: block;
      line-height: 1.3;
    }

    .footer {
      margin-top: 30px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.5;
      font-weight: 400;
      opacity: 0.8;
    }

    /* Ajuste para celular */
    @media (max-width: 400px) {
      .btn-wrapper { flex-direction: column; }
      .btn { min-height: auto; flex-direction: row; padding: 16px; font-size: 15px; }
      .logo { margin-bottom: -40px; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <img src="logo-apidep.png" class="logo" alt="Logo APIDEP">

    <h1>Sistemas Defensoriais</h1>

    <div class="btn-wrapper">
      <a href="https://calculadora-alimentar-dpe.vercel.app/" class="btn btn-calc">
        <span style="font-size: 24px;">⚖️</span>
        <span>Calculadora de Pensão</span>
      </a>

      <a href="https://gerador-oficios-dp.vercel.app/" class="btn btn-jornada">
        <span style="font-size: 24px;">📄</span>
        <span>Jornadas e Ofícios</span>
      </a>
    </div>

    <div class="footer">
      Associação Piauiense das Defensoras e Defensores Públicos
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistemas Defensoriais</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      width: 480px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      animation: fade 0.8s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      max-width: 320px;
      width: 100%;
      margin-bottom: 20px;
    }

    h1 {
      color: #065f46;
      margin-bottom: 30px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: 0.3s;
    }

    .card.light {
      background: #ecfdf5;
      color: #065f46;
    }

    .card.dark {
      background: linear-gradient(90deg, #065f46, #10b981);
      color: white;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #6b7280;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo-apidep.png" class="logo">

    <h1>Sistemas Defensoriais</h1>

    <a class="card light" href="https://calculadora-alimentar-dpe.vercel.app/">
      ⚖️ Calculadora de Pensão Alimentícia →
    </a>

    <a class="card dark" href="https://gerador-oficios-dp.vercel.app/">
      📄 Jornadas Itinerantes e Ofícios →
    </a>

    <div class="footer">
      Associação Piauiense das Defensoras e Defensores Públicos
    </div>

  </div>

</body>
</html>
